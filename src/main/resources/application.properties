# ==========================
# BASE DE DATOS ACTIVA: MySQL
# ==========================

# --- MySQL ---
spring.datasource.url=jdbc:mysql://localhost:3306/Mundo_Mascota?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# --- H2 (descomentar si no tienes MySQL disponible) ---
# spring.datasource.url=jdbc:h2:mem:mundoMascota;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# ==========================
# JPA / HIBERNATE
# ==========================
# update = crea/modifica tablas automaticamente segun las entidades
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================
# SERVIDOR
# ==========================
server.port=8080
